name: Flux
description: Smart currency converter with analytics and favorites
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # In-app purchases
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  # Генерация иконок
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
